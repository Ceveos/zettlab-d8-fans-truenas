# Zettlab D8 Fan Curve Configuration
# Sourced by control_hdd_fans.sh — values are PWM on 0-183 scale

# Fan curve: TEMP_THRESHOLD=PWM_VALUE (space-separated pairs, ascending temp)
# At each threshold, if hottest disk >= threshold, PWM is set to that value.
# Below the lowest threshold, PWM is set to PWM_MIN.
FAN_CURVE="33:92 38:120 42:145 46:165 50:183"
PWM_MIN=70

# Fallback PWM when no disk temperatures can be read (~79%)
PWM_FALLBACK=145

# Temperature alert thresholds (Celsius)
TEMP_WARNING=50
TEMP_CRITICAL=55

# Hysteresis: suppress PWM decrease smaller than this (prevents oscillation)
HYSTERESIS_DOWN=15

# Heartbeat: log a status line every N runs (1 run = 1 cron interval)
HEARTBEAT_INTERVAL=15
